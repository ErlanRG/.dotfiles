################
### PROGRAMS ###
################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Super key
$mainMod = SUPER

# General Apps
$browser = zen-browser
$filemanager = thunar
$terminal = kitty -e tmux
$appmenu = ~/.config/rofi/launchers/type-3/launcher.sh
$powermenu = ~/.config/rofi/powermenu/type-1/powermenu.sh
$windowsmenu = rofi -show window -config $HOME/.config/rofi/launchers/type-4/style-5.rasi

###################
### KEYBINDINGS ###
###################

# Applications
bind = $mainMod, RETURN, exec, $terminal            # Open the terminal
bind = $mainMod, N, exec, $filemanager              # Open the file manager
bind = $mainMod, W, exec, $browser                  # Open the browser

# Windows
bind = $mainMod SHIFT, F, togglefloating            # Toggle active windows into floating mode
bind = $mainMod SHIFT, H, movewindow, l             # Move window left
bind = $mainMod SHIFT, J, movewindow, d             # Move window down
bind = $mainMod SHIFT, K, movewindow, u             # Move window up
bind = $mainMod SHIFT, L, movewindow, r             # Move window right
bind = $mainMod, F, fullscreen, 0                   # Set active window to fullscreen
bind = $mainMod, H, movefocus, l                    # Move focus left
bind = $mainMod, J, movefocus, d                    # Move focus down
bind = $mainMod, K, movefocus, u                    # Move focus up
bind = $mainMod, L, movefocus, r                    # Move focus right
bind = $mainMod, C, killactive,                     # Kill active window
bindm = $mainMod, mouse:272, movewindow             # Move window with the mouse
bindm = $mainMod, mouse:273, resizewindow           # Resize window with the mouse

# Actions
bind = $mainMod SHIFT, E, exec, $powermenu          # Open power menu
bind = $mainMod SHIFT, R, exec, hyprctl reload      # Reload Hyprland config
bind = $mainMod, D, exec, $appmenu                  # Open application launcher
bind = $mainMod, T, exec, $windowsmenu              # Open window menu
# TODO: Make a script for these two commands including a rofi menu (?)
bind =, Print, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshot-$(date +%F_%T).png
bind = SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of whole screen taken" -t 1000 # screenshot of the whole screen


# Workspaces
bind = $mainMod, 1, workspace, 1                    # Open workspace 1
bind = $mainMod, 2, workspace, 2                    # Open workspace 2
bind = $mainMod, 3, workspace, 3                    # Open workspace 3
bind = $mainMod, 4, workspace, 4                    # Open workspace 4
bind = $mainMod, 5, workspace, 5                    # Open workspace 5
bind = $mainMod, 6, workspace, 6                    # Open workspace 6
bind = $mainMod, 7, workspace, 7                    # Open workspace 7
bind = $mainMod, 8, workspace, 8                    # Open workspace 8
bind = $mainMod, 9, workspace, 9                    # Open workspace 9
bind = $mainMod, 0, workspace, 10                   # Open workspace 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1        # Move to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2        # Move to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3        # Move to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4        # Move to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5        # Move to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6        # Move to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7        # Move to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8        # Move to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9        # Move to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10       # Move to workspace 10
bind = $mainMod, mouse_down, workspace, e+1         # Scroll to previous workspace
bind = $mainMod, mouse_up, workspace, e-1           # Scroll to next workspace


# Function keys
# TODO: @see: https://github.com/mylinuxforwork/dotfiles/blob/main/share/dotfiles/.config/hypr/conf/keybindings/default.conf
# Check the `Fn keys` section and include some useful keybindings.
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


