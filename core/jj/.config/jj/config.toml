#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Erlan Rangel"
email = "erlanrangel@gmail.com"

[ui]
default-command = "log"
editor = "nvim"
show-cryptographic-signatures = true

[signing]
backend = "gpg"
key = "DC0D000AF0E2F482D26E1F783E14B635578843AF"
behavior = "own"

[working-copy]
eol-conversion = "input"

[aliases]
l = ["log", "-r", "::@"]
d = ["diff"]
ll = ["log"]
ps = ["git", "push"]
f = ["git", "fetch"]
s = ["status"]
cl = ["git", "clone"]

[template-aliases]
'format_short_id(id)' = 'id.shortest(12)'

[snapshot]
max-new-file-size = "5MiB"
