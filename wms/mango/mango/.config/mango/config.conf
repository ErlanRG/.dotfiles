# ────────────── Monitors Configuration ──────────────
monitorrule = name:DP-1,width:3440,height:1440,refresh:165

# ────────────── Keyboard ──────────────
xkb_rules_layout = us,latam
xkb_rules_options = grp:win_space_toggle,compose:ralt,ctrl:nocaps
bind = SUPER+SPACE,switch_keyboard_layout,

numlockon = 1
repeat_delay = 300
repeat_rate = 40

# ────────────── Trackpad ──────────────
disable_trackpad = 0
tap_to_click = 1
tap_and_drag = 1
drag_lock = 1
trackpad_natural_scrolling = 0
disable_while_typing = 1
left_handed = 0
middle_button_emulation = 0
swipe_min_threshold = 1

# ────────────── Blur ──────────────
blur = 1
blur_layer = 1
blur_optimized = 1
blur_params_brightness = 1.0
blur_params_contrast = 1.4
blur_params_noise = 0.02
blur_params_num_passes = 4
blur_params_radius = 6
blur_params_saturation = 1.4

layer_shadows = 1
shadow_only_floating = 1
shadows = 1
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadows_size = 8
shadowscolor= 0x000000ff

border_radius = 6
focused_opacity = 1.0
no_radius_when_single = 0
unfocused_opacity = 1.0

# ────────────── Animation Configuration ──────────────
animation_curve_close = 0.3,0.85,0.4,1
animation_curve_focus = 0.2,0.8,0.2,1
animation_curve_move = 0.2,0.85,0.25,1
animation_curve_opafadein = 0.3,0.9,0.3,1
animation_curve_opafadeout = 0.4,0.8,0.5,1
animation_curve_open = 0.25,0.9,0.3,1.05
animation_curve_tag = 0.2,0.85,0.25,1
animation_duration_close = 300
animation_duration_focus = 220
animation_duration_move = 260
animation_duration_open = 320
animation_duration_tag = 200
animation_fade_in = 1
animation_fade_out = 1
animation_type_close = slide
animation_type_open = zoom

fadein_begin_opacity = 0.3
fadeout_begin_opacity = 0.7

layer_animation_type_close = fade
layer_animation_type_open = fade
layer_animations = 1

zoom_end_ratio = 1.0
zoom_initial_ratio = 0.85

# Tag direction (1: horizontal, 0: vertical)
tag_animation_direction = 1

# Master switch
animations = 1

# ────────────── Scroller Layout Setting ──────────────
edge_scroller_pointer_focus = 1
scroller_default_proportion = 0.75
scroller_default_proportion_single = 1.0
scroller_focus_center = 0
scroller_prefer_center = 0
scroller_proportion_preset = 0.25,0.5
scroller_structs = 3

# ────────────── Master-Stack Layout Setting ──────────────
center_master_overspread = 1
default_mfact = 0.50
default_nmaster = 1
new_is_master = 1
smartgaps = 0

# ────────────── Overview Setting ──────────────
enable_hotarea = 1
hotarea_size = 10
hotarea_corner = 0
ov_tab_mode = 1
overviewgappi = 2
overviewgappo = 10

# Misc
axis_bind_apply_timeout = 100
drag_tile_to_tile = 1
enable_floating_snap = 0
focus_cross_monitor = 0
focus_cross_tag = 0
focus_on_activate = 1
idleinhibit_ignore_visible = 0
no_border_when_single = 0
sloppyfocus = 1
snap_distance = 30
warpcursor = 1

# ────────────── Mouse ──────────────
# need relogin to make it apply
cursor_size = 24
cursor_theme = catppuccin-mocha-light-cursors
mouse_natural_scrolling = 0

# ────────────── Appearance ──────────────
borderpx = 1
gappih = 3
gappiv = 3
gappoh = 3
gappov = 3
scratchpad_height_ratio = 0.9
scratchpad_width_ratio = 0.8
bordercolor = 0x444444ff
focuscolor = 0xc94e2d5ff
globalcolor = 0x89b4faff
maximizescreencolor = 0xc94e2d5ff
scratchpadcolor = 0xcba6f7ff
urgentcolor = 0xf38ba8f

# ────────────── Layout support ──────────────
# Circle through specific layouts
circle_layout = tgmix,center_tile,tile

# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule = id:1,layout_name:tgmix
tagrule = id:2,layout_name:tgmix
tagrule = id:3,layout_name:tgmix
tagrule = id:4,layout_name:tile,nmaster:1,mfact:0.75
tagrule = id:5,layout_name:tgmix
tagrule = id:6,layout_name:tgmix
tagrule = id:7,layout_name:tgmix
tagrule = id:8,layout_name:tgmix
tagrule = id:9,layout_name:tgmix

source = ~/.config/mango/autostart.conf
source = ~/.config/mango/env.conf
source = ~/.config/mango/keybinds.conf
source = ~/.config/mango/rules.conf
