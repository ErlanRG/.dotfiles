# Hyprlock configuration
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

general {
    hide_cursor = true
    # no_fade_in = false
    # grace = 2
    text_trim = true
    fractional_scaling = 2
}

background {
    monitor =
    path = $HOME/Nextcloud/Wallpapers/japan-artistic-3840x2160-25406.jpg
    color = rgba(17, 17, 27, 1.0)

    blur_size = 4
    blur_passes = 3
    noise = 0.0117
    contrast = 1.2
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# === TIME ===
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(205, 214, 244, 1.0)
    font_size = 96
    font_family = Iosevka Nerd Font Mono
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_boost = 1.0

    position = 0, 130
    halign = center
    valign = center
}

# === DATE ===
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(166, 173, 200, 1.0)
    font_size = 20
    font_family = Iosevka Nerd Font Mono

    position = 0, -60
    halign = center
    valign = center
}

# === INPUT FIELD ===
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1

    outer_color = rgba(108, 112, 134, 0.8)
    inner_color = rgba(49, 50, 68, 0.6)
    font_color = rgba(205, 214, 244, 1.0)
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    capslock_color = rgba(249, 226, 175, 1.0)

    rounding = 12
    fade_on_empty = true
    placeholder_text = Password...
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    hide_input = false

    position = 0, -155
    halign = center
    valign = center
}

# === KEYBOARD LAYOUT ===
label {
    monitor =
    text = $LAYOUT[en]
    color = rgba(180, 190, 254, 0.8)
    font_size = 14
    font_family = Iosevka Nerd Font Mono

    position = 30, -30
    halign = left
    valign = bottom

    onclick = hyprctl switchxkblayout all next
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}
